site_name: Spider
site_description: 轻量级 Agent 系统 — 仿 Hermes 设计模式的学习项目
site_url: https://github.com/liuli/spider
repo_url: https://github.com/liuli/spider
repo_name: liuli/spider
edit_uri: blob/main/docs/

theme:
  name: material
  language: zh
  icon:
    logo: fontawesome/solid/spider
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: dark)"
      primary: indigo
      accent: blue
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式
    - media: "(prefers-color-scheme: light)"
      primary: indigo
      accent: blue
      scheme: default
      toggle:
        icon: material/weather-night
        name: 切换暗色模式

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: "#"
      permalink_title: 永久链接

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/liuli/spider
  generator: false

copyright: Copyright &copy; 2026 Spider Project

nav:
  - 首页: index.md
  - 快速开始: 快速开始.md
  - 使用指南: 使用指南.md
  - 架构设计: 架构设计.md
  - 核心模块: 核心模块.md
  - 工具集: 工具集.md
  - 设计模式: 设计模式.md
  - 路线图: 路线图.md
  - 开发记录: 开发记录.md

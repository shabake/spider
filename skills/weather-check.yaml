name: weather-check
description: 查询任意城市的实时天气和未来天气预报
trigger: 天气|气温|weather|温度|降雨|台风|预报
prompt: "当用户需要查询天气时，按以下步骤操作：\n\n1. **确定城市**：从用户输入中提取城市名称，如果没有明确，先询问用户。\n\n2. **查询实时天气**：使用\
  \ shell 工具执行以下命令获取天气信息：\n   ```\n   curl -s \"wttr.in/{城市}?format=%l:+%c+%t+%h+%w+%p\"\
  \n   ```\n   例如查询北京：`curl -s \"wttr.in/北京?format=%l:+%c+%t+%h+%w+%p\"`\n   \n  \
  \ 参数说明：%l=地点, %c=天气图标, %t=温度, %h=湿度, %w=风速, %p=降水概率\n\n3. **查询详细预报**：使用 shell 工具执行：\n\
  \   ```\n   curl -s \"wttr.in/{城市}?lang=zh&format=v2\"\n   ```\n   或用更详细的显示：\n \
  \  ```\n   curl -s \"wttr.in/{城市}?lang=zh&0\"\n   ```\n\n4. **整理并展示结果**：将获取的信息以清晰美观的格式展示给用户，包括：\n\
  \   - \U0001F321️ 当前温度\n   - \U0001F4A7 湿度\n   - \U0001F32C️ 风速\n   - \U0001F327\
  ️ 降水概率\n   - ☀️ 天气状况描述\n\n5. **如果请求失败**：尝试使用城市英文名（如 Beijing 代替 北京），或使用拼音。\n\n注意：wttr.in\
  \ 是免费公共天气服务，无需 API Key。"
tools:
- shell
created: '2026-06-25'
